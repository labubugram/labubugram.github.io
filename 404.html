<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0d1117;           /* твой любимый фон */
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        video {
            max-width: 90vw;               /* не вылезает за экран */
            max-height: 90vh;
            width: auto;
            height: auto;                  /* своя настоящая величина */
            opacity: 0;
            animation: videoCycle 15s ease-in-out infinite;
            object-fit: contain;           /* не растягивается */
        }

        /* ЦИКЛ: появляется 1 сек → видно ~11 сек → исчезает 1 сек → пауза ~2 сек */
        @keyframes videoCycle {
            0%    { opacity: 0; }
            6.7%  { opacity: 1; }   /* плавное появление ~1 секунда */
            80%   { opacity: 1; }   /* видео играет */
            86.7% { opacity: 0; }   /* плавное исчезновение ~1 секунда */
            100%  { opacity: 0; }   /* короткая пауза перед новым циклом */
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline preload="auto">
        <source src="video.mp4" type="video/mp4">
        <!-- если хочешь другой формат: -->
        <!-- <source src="video.webm" type="video/webm"> -->
        Твой браузер не поддерживает видео.
    </video>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: #0d1117;           
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        img {
            max-width: 90vw;          
            max-height: 90vh;
            width: auto;
            height: auto;               
            opacity: 0;
            animation: gifCycle 12s ease-in-out infinite;   
            object-fit: contain;
        }

       
        @keyframes gifCycle {
            0%    { opacity: 0; }
            7%    { opacity: 1; }  
            78%   { opacity: 1; }  
            85%   { opacity: 0; }   
            100%  { opacity: 0; }  
        }
    </style>
</head>
<body>

    <img src="loop.gif" alt="">

</body>
